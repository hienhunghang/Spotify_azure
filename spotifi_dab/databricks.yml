bundle:
  name: spotifi_dab
  

# Variable declarations. These variables are assigned in the dev/prod targets below.

variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: ${databricks_host}
      root_path: /Workspace/Users/${databricks_current_user.official_email}/.bundle/${bundle.name}/${bundle.target}
    presets:
      source_linked_deployment: false


    variables:
      catalog: spotifi
      schema: dev

  prod:
    mode: production
    workspace:
      host: https://adb-xxxxxxxxx.azuredatabricks.net 
      root_path: /Shared/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: spotifi
      schema: prod

